<p class="sec">象传（小象）</p>
<p class="text">君子豹变，其文蔚也。小人革面，顺以从君也。</p>
<p class="comment">'The superior man produces his changes as the leopard does when he changes his spots:' - their beauty becomes more elegant. 'Small men change their faces:' - they show themselves prepared to follow their ruler.</p>
