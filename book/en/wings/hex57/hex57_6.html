<p class="sec">象传（小象）</p>
<p class="text">巽在床下，上穷也。丧其资斧，正乎凶也。</p>
<p class="comment">'The representative of penetration is beneath a couch:' - though occupying the topmost place, his powers are exhausted. 'He has lost the axe with which he executed his decisions:' - though he try to be correct, there will be evil.</p>
