<p class="sec">象传（小象）</p>
<p class="text">进退，志疑也。利武人之贞，志治也。</p>
<p class="comment">'(Now) he advances, (now) he recedes:' - his mind is perplexed. 'It would be advantageous for him to have the firmness of a brave soldier:' - his mind would in that case be well governed.</p>
