<p class="sec">象传（小象）</p>
<p class="text">六二之动，直以方也。不习无不利，地道光也。</p>
<p class="comment">The movement indicated by the second six, (divided),is 'from the straight (line) to the square.' '(Its operation), without repeated effort, in every way advantageous,' shows the brilliant result of the way of earth.</p>
