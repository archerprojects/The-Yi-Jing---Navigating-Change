<p class="sec">象传（小象）</p>
<p class="text">履霜坚冰，阴始凝也。驯致其道，至坚冰也。</p>
<p class="comment">'He is treading on hoarfrost; - the strong ice will come (by and by):' - the cold (air) has begun to take form. Allow it to go on quietly according to its nature, and (the hoarfrost) will come to strong ice.</p>
