<p class="sec">象传（小象）</p>
<p class="text">含章可贞；以时发也。或从王事，知光大也。</p>
<p class="comment">'He keeps his excellence tinder restraint, but firmly maintains it:' - at the proper time he will manifest it. 'He may have occasion to engage in the king's service: - great is the glory of his wisdom.</p>
