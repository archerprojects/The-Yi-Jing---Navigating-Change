<p class="sec">象传（小象）</p>
<p class="text">丰其屋，天际翔也。闚其户，阒其无人，自藏也。</p>
<p class="comment">'He has made his house large:' - he soars (in his pride) to the heavens. 'He looks at his door, which is still, with no one about it:' - he (only) keeps himself withdrawn from all others.</p>
