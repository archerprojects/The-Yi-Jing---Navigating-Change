<p class="sec">象传（小象）</p>
<p class="text">乘其墉，义弗克也，其吉，则困而反则也。</p>
<p class="comment">'He is mounted on his city-wall;' but yielding to the right, 'he does not proceed to make the attack (he contemplated).' (Where it is said),'There will be good fortune,' (that shows how) he feels the strait he is in, and returns to the rule of law.</p>
