<span class="han">同人</span> 13<br>
</p>

<p class="sec">象传（小象）</p>
<p class="text">同人之先，以中直也。大师相遇，言相克也。</p>
<p class="comment">The first action of (the representative of) the union of men (here described) arises from his central position and straightforward character. 'The meeting secured by his great host' intimates that the opponents of it have been overcome.</p>
