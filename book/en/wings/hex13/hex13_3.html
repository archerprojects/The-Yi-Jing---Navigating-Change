<p class="sec">象传（小象）</p>
<p class="text">伏戎于莽，敌刚也。三岁不兴，安行也。</p>
<p class="comment">'He hides his arms in the thick grass:' - because of the strength of his opponent. 'For three years he makes no demonstration:' - how can he do anything?</p>
