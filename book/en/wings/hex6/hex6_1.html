<p class="sec">象传（小象）</p>
<p class="text">不永所事，讼不可长也。虽有小言，其辩明也。</p>
<p class="comment">'He does not perpetuate the matter about which (the contention is):' - contention should not be prolonged. Although 'he may suffer the small (injury) of being spoken against,' his argument is clear.</p>
