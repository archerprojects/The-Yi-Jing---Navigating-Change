<p class="sec">象传（小象）</p>
<p class="text">不克讼，归而逋也。自下讼上，患至掇也。</p>
<p class="comment">'He is unequal to the contention; he retires and keeps concealed, stealthily withdrawing from it:' - for him from his lower place to contend with (the stronger one) above, would be to (invite) calamity, as if he brought it with his hand to himself.</p>
