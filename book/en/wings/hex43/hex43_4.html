<p class="sec">象传（小象）</p>
<p class="text">其行次且，位不当也。闻言不信，聪不明也。</p>
<p class="comment">'He walks slowly and with difficulty:' - he is not in the place appropriate to him. 'He hears these words, but does not believe them:' - he hears, but does not understand.</p>
