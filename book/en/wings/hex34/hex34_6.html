<span class="han">大壯</span> 34<br>
</p>

<p class="sec">象传（小象）</p>
<p class="text">不能退，不能遂，不祥也。艰则吉，咎不长也。</p>
<p class="comment">'He is unable either to retreat or to advance:' - this is owing to his want of care. 'If he realise the difficulty (of his position), there will be good fortune:' - his error will not be prolonged.</p>
