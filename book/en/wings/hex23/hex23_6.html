<p class="sec">象传（小象）</p>
<p class="text">君子得舆，民所载也。小人剥庐，终不可用也。</p>
<p class="comment">'The superior man finds himself in a carriage:' - he is carried along by the people. 'The small men (by their course) overthrow their own dwellings:' - they can. never again be of use to them.</p>
