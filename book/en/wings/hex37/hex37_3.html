<span class="han">家人</span> 37<br>

<p class="sec">象传（小象）</p>
<p class="text">家人嗃嗃，未失也；妇子嘻嘻，失家节也。</p>
<p class="comment">When 'the members of the household are treated with stern severity,' there has been no (great) failure (in the regulation of the family). When 'wife and children are smirking and chattering,' the (proper) economy of the family has been lost.</p>
