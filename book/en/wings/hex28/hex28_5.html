<p class="sec">象传（小象）</p>
<p class="text">枯杨生华，何可久也。老妇士夫，亦可丑也。</p>
<p class="comment">'A decayed willow produces flowers:' - but how can this secure its long continuance? 'An old wife and a young husband:' - this also is a thing to be ashamed of.</p>
