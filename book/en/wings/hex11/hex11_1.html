<p class="sec">象传（小象）</p>
<p class="text">拔茅征吉，志在外也。</p>
<p class="comment">'The good fortune of advance, (as suggested by the emblem of) the grass pulled up,' arises from the will (of the party intended) being set on what is external to himself.</p>
