<p class="sec">象传（小象）</p>
<p class="text">贞吉悔亡，未感害也。憧憧往来，未光大也。</p>
<p class="comment">'Firm correctness will lead to good fortune, and prevent all occasion for repentance:' - there has not yet been any harm from (a selfish wish to) influence. 'He is unsettled in his movements:'(his power to influence) is not yet either brilliant or great.</p>
