<p class="sec">象传（小象）</p>
<p class="text">虽凶居吉，顺不害也。</p>
<p class="comment">Though 'there would be evil; yet, if he abide (quiet) in his place, there will be good fortune:' - through compliance (with the circumstances of his condition and place) there will be no injury.</p>
