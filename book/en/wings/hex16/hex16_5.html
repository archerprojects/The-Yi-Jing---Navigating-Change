<p class="sec">象传（小象）</p>
<p class="text">六五贞疾，乘刚也。恒不死，中未亡也。</p>
<p class="comment">'(The subject of) the fifth six has a chronic complaint:' - this is shown by his being mounted on the strong (line). 'He still lives on without dying:' - he is in the central position, (and its memories of the past) have not yet perished.</p>
