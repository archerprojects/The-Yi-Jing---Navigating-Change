<p class="sec">象传（小象）</p>
<p class="text">来徐徐，志在下也。虽不当位，有与也。</p>
<p class="comment">'He proceeds very slowly (to help the subject of the first line):' - his aim is directed to (help) that lower (line). Although he is not in his appropriate place, he and that other will (in the end) be together.</p>
