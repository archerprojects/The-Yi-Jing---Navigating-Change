<p class="sec">象传（小象）</p>
<p class="text">困于葛藟，未当也。动悔，有悔吉，行也。</p>
<p class="comment">'He is straitened as if bound with creepers: (his spirit and action) are unsuitable. '(He says), "If I move, I shall repent of it." And he does repent (of former errors), which leads to good fortune:' - so he (now) goes on.</p>
