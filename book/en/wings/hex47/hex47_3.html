<p class="sec">象传（小象）</p>
<p class="text">据于蒺蔾，乘刚也。入于其宫，不见其妻，不祥也。</p>
<p class="comment">'He lays hold of thorns:' - (this is suggested by the position of the line) above the strong (line). 'He enters his palace, and does not see his wife:' - this is inauspicious.</p>
