<p class="sec">象传（小象）</p>
<p class="text">虽磐桓，志行正也。以贵下贱，大得民也。</p>
<p class="comment">Although 'there is a difficulty in advancing,' the mind (of the subject of the line) is set on doing what is correct. While noble, he humbles himself to the mean, and grandly gains the people.</p>
