<p class="sec">象传（小象）</p>
<p class="text">六二之难，乘刚也。十年乃字，反常也。</p>
<p class="comment">The difficulty (to the subject of) the second six, (divided), arises from, its place over the undivided line below it. 'The union and children after ten years' shows things resuming their regular course.</p>
