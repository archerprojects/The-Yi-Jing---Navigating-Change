<p class="sec">象传（小象）</p>
<p class="text">即鹿无虞，以纵禽也。君子舍之，往吝穷也。</p>
<p class="comment">'One pursues the deer without the (guidance of the) forester:' - (he does so) in (his eagerness to) follow the game. 'The superior man gives up the chase, (knowing that) if he go forward he will regret it:' - he would be reduced to extremity.</p>
