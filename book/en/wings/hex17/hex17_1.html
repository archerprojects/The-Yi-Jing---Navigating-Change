<p class="sec">象传（小象）</p>
<p class="text">官有渝，从正吉也。出门交有功，不失也。</p>
<p class="comment">'He is changing the object of his pursuit:' - but if he follow what is correct, there will be good fortune. 'He goes beyond (his own) gate to find associates:' - he will not fail (in the method he pursues).</p>
