<p class="sec">象传（小象）</p>
<p class="text">随有获，其义凶也。有孚在道，明功也。</p>
<p class="comment">'He is followed and obtains adherents:' - according to the idea (of the hexagram), this is evil. 'He is sincere in his course:' - showing his intelligence, and leading to achievement.</p>
