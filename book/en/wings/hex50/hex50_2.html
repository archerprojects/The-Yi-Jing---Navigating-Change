<p class="sec">象传（小象）</p>
<p class="text">鼎有实，慎所之也。我仇有疾，终无尤也。</p>
<p class="comment">'There is the caldron with the things (to be cooked) in it:' - let (the subject of the line) be careful where he goes. 'My enemy dislikes me:' - but there will in the end be no fault (to which he can point).</p>
