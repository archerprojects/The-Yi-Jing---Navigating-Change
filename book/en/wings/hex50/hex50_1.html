<p class="sec">象传（小象）</p>
<p class="text">鼎颠趾，未悖也。利出否，以从贵也。</p>
<p class="comment">'The caldron is overturned, and its feet turned upwards:' - but this is not (all) contrary (to what is right). 'There will be advantage in getting rid of what was bad:' - thereby (the subject of the line) will follow the more noble (subject of the fourth line).</p>
