<p class="sec">象传（小象）</p>
<p class="text">咸临，吉无不利；未顺命也。</p>
<p class="comment">'The good fortune and every possible advantage attending the advance (of the subject of the second line), in company (with the subject of the first),' arises from the fact that those (to whom the advance is made) are not yet obedient to the ordinances (of Heaven).</p>
