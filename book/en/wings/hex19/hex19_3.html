<p class="sec">象传（小象）</p>
<p class="text">甘临，位不当也。既忧之，咎不长也。</p>
<p class="comment">'He (shows himself) well pleased to advance:' - his position is not that appropriate to him. 'If he become anxious, however, about his action,' his error will not be continued.</p>
