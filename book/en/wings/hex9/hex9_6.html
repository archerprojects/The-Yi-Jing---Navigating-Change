<p class="sec">象传（小象）</p>
<p class="text">既雨既处，德积载也。君子征凶，有所疑也。</p>
<p class="comment">'The rain has fallen and (the onward progress) is stayed:' - the power (denoted in the figure) has accumulated to the full. 'If the superior man prosecute his measures, there will be evil:' - he will find himself obstructed.</p>
