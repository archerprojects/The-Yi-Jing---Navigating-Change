<p class="sec">象传（小象）</p>
<p class="text">拔茅贞吉，志在君也。</p>
<p class="comment">'The good fortune through firm goodness, (suggested by) the pulling up of the grass,' arises from the will (of the parties intended) being bent on (serving) the ruler.</p>
