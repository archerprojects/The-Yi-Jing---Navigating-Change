<p class="sec">象传（小象）</p>
<p class="text">井渫不食，行恻也。求王明，受福也。</p>
<p class="comment">'The well has been cleared out, but is not used:' - (even) passers-by would be sorry for this. A prayer is made 'that the king were intelligent:' - for then blessing would be received.</p>
