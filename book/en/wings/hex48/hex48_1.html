<p class="sec">象传（小象）</p>
<p class="text">井泥不食，下也。旧井无禽，时舍也。</p>
<p class="comment">'A well so muddy that men will not drink of it:' - this is indicated by the low position (of the line). 'An old well to which the birds do not come:' - it has been forsaken in the course of time.</p>
