<p class="sec">象传（小象）</p>
<p class="text">往蹇来连，当位实也。</p>
<p class="comment">'To advance will (only be to) encounter (greater) difficulties; he remains stationary, and unites (with the subject of the line above):' - that is in its proper place and has the solidity (due to it in that position).</p>
