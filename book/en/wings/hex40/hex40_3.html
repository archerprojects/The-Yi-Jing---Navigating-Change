<p class="sec">象传（小象）</p>
<p class="text">负且乘，亦可丑也，自我致戎，又谁咎也。</p>
<p class="comment">For 'a porter with his burden to be riding in a carriage' is a thing to be ashamed of. 'It is he himself that tempts the robbers to come:' - on whom besides can we lay the blame? (See Appendix III, i, 48.)</p>
