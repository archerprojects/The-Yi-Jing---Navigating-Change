<p class="title">
<span class="han">恆</span> 32<br>
</p>
</blockquote>
<p class="sec">象传（小象）</p>
<p class="text">妇人贞吉，从一而终也。夫子制义，从妇凶也。</p>
<p class="comment">'Such firm correctness in a wife will be fortunate:' - it is hers to the end of life to follow with an unchanged mind. The husband must decide what is right, and lay down the rule accordingly: - for him to follow (like) a wife is evil.</p>
