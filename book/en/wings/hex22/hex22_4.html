<p class="sec">象传（小象）</p>
<p class="text">六四，当位疑也。匪寇婚媾，终无尤也。</p>
<p class="comment">'The place occupied by the fourth six, (divided),' affords ground for doubt (as to its subject); but '(as the subject of the third pursues) not as a robber, but as intent on a matrimonial alliance,' he will in the end have no grudge against him.</p>
