<p class="sec">象传（小象）</p>
<p class="text">有孚惠心，勿问之矣。惠我德，大得志也。</p>
<p class="comment">'(The ruler) with sincere heart seeks to benefit (all below):' - there need be no question (about the result). '(All below) with sincere heart acknowledge (his goodness):' - he gets what he desires on a great scale.</p>
