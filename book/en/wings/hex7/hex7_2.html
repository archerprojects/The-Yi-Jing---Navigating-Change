<p class="sec">象传（小象）</p>
<p class="text">在师中吉，承天宠也。王三锡命，怀万邦也。</p>
<p class="comment">'He is in the midst of the host, and there will be good fortune:' - he has received the favour of Heaven. 'The king has thrice conveyed to him the orders (of) his favour:' - (the king) cherishes the myriad regions in his heart.</p>
