<span class="han">師</span> 7<br>
</p>
</blockquote>
<p class="sec">象传（小象）</p>
<p class="text">长子帅师，以中行也。弟子舆尸，使不当也。</p>
<p class="comment">'The oldest son leads the host:' - its movements are directed by him in accordance with his position in the centre. 'Younger men idly occupy their positions:' - the employment of such men is improper.</p>
