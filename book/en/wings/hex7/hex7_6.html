<span class="han">師</span> 7<br>
</p>

<p class="sec">象传（小象）</p>
<p class="text">大君有命，以正功也。小人勿用，必乱邦也。</p>
<p class="comment">'The great ruler delivers his charges:' - thereby he rightly apportions merit. 'Small men should not be employed:' - they are sure to throw the states into confusion.</p>
