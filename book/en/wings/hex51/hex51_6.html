</p>

<p class="sec">象传（小象）</p>
<p class="text">震索索，中未得也。虽凶无咎，畏邻戒也。</p>
<p class="comment">'Amid the startling movements he is in breathless dismay:' - he has not found out (the course of) the due mean. 'Though evil (threatens), he will not fall into error:' - he is afraid of being warned by his neighbours.</p>
