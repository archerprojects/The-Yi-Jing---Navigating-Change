<p class="sec">象传（小象）</p>
<p class="text">震来虩虩，恐致福也。笑言哑哑，后有则也。</p>
<p class="comment">'When the (time of) movement comes, he will be found looking out with apprehension:' -  that feeling of dread leads to happiness. 'He yet smiles and talks cheerfully:' - the issue (of his dread) is that he adopts (proper) laws (for his course).</p>
