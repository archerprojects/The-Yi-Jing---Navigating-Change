<p class="sec">象传（小象）</p>
<p class="text">震往来厉，危行也。其事在中，大无丧也。</p>
<p class="comment">'He goes and comes amid the startling movements, and (always) in peril:' - full of risk are his doings. 'What he has to do has to be done in his central position:' - far will he be from incurring any loss.</p>
