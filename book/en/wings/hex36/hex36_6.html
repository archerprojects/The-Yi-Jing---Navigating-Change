<span class="han">明夷</span> 36<br>
</p>

<p class="sec">象传（小象）</p>
<p class="text">初登于天，照四国也。后入于地，失则也。</p>
<p class="comment">'He had at first ascended to (the top of) the sky:' - he might have enlightened the four quarters of the kingdom. 'His future shall be to go into the earth:' - he has failed to fulfil the model (of a ruler).</p>
