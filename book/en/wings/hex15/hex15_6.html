<p class="sec">象传（小象）</p>
<p class="text">鸣谦，志未得也。可用行师，征邑国也。</p>
<p class="comment">'His humility has made itself recognised:' - (but) all his aims have not yet been attained. He may employ the force of arms, (but only) in correcting (his own) towns and state.'</p>
