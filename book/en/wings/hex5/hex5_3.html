<p class="sec">象传（小象）</p>
<p class="text">需于泥，灾在外也。自我致寇，敬慎不败也。</p>
<p class="comment">'He is waiting in the mud:' - calamity is (close at hand, and as it were) in the outer (trigram). 'He himself invites the approach of injury:' - if he be reverent and careful, he will not be worsted.</p>
