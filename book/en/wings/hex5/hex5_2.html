<p class="sec">象传（小象）</p>
<p class="text">需于沙，衍在中也。虽小有言，以终吉也。</p>
<p class="comment">'He is waiting on the sand:' - he occupies his position in the centre with a generous forbearance. Though 'he suffer the small injury of being spoken (against),' he will bring things to a good issue.</p>
