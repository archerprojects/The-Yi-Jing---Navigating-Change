<p class="sec">象传（小象）</p>
<p class="text">颠颐之吉，上施光也。</p>
<p class="comment">'The good fortune attached to looking downwards for (the power to) nourish,' shows how brilliant will be the diffusion (of that power) from (the subject of the line's) superior position.</p>
