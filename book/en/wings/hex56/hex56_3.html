<p class="sec">象传（小象）</p>
<p class="text">旅焚其次，亦以伤矣。以旅与下，其义丧也。</p>
<p class="comment">'The stranger burns his lodging-house:' - and he himself also suffers hurt thereby. When, as a stranger, he treats those below him (as the line indicates), the right relation between him and them is lost.</p>
