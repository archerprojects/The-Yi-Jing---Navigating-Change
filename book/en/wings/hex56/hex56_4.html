<p class="sec">象传（小象）</p>
<p class="text">旅于处，未得位也。得其资斧，心未快也。</p>
<p class="comment">'The stranger is in a resting-place:' - but he has not got his proper position. 'He has the means of livelihood, and the axe:' - but his mind is not at ease.</p>
