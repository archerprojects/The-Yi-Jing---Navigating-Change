<p class="sec">象传（小象）</p>
<p class="text">晋如，摧如；独行正也。裕无咎；未受命也。</p>
<p class="comment">'He appears wishing to advance, but (at the same time) being kept back:' - all-alone he pursues the correct course. 'Let him maintain a large and generous mind, and there will be no error:' - he has not yet received an official charge.</p>
