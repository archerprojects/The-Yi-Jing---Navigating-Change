<blockquote>
<p class="title">
<span class="han">歸妹</span> 54<br>
</p>
</blockquote>
<p class="sec">象传（小象）</p>
<p class="text">帝乙归妹，不如其娣之袂良也。其位在中，以贵行也。</p>
<p class="comment">'The sleeves of the younger sister of (king) Di-yi, when she was married away, were not equal to those of her (half-)sister, who accompanied her:' - such was her noble character, indicated by the central position of the line.</p>
