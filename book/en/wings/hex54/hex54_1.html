<blockquote>
<p class="title">
<span class="han">歸妹</span> 54<br>
</p>
</blockquote>
<p class="sec">象传（小象）</p>
<p class="text">归妹以娣，以恒也。跛能履吉，相承也。</p>
<p class="comment">'The younger sister is married off in a position ancillary to that of the real wife:' - it is the constant practice (for such a case). 'Lame on one leg, she is able to tramp along:' - she can render helpful service.</p>
