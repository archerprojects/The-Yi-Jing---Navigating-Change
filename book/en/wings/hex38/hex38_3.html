<p class="sec">象传（小象）</p>
<p class="text">见舆曳，位不当也。无初有终，遇刚也。</p>
<p class="comment">'We see his carriage dragged back:' - this is indicated by the inappropriateness of the position (of the line). 'There is no (good) beginning, but there will be a (good) end:' - this arises from his meeting with the strong (subject of the topmost line).</p>
