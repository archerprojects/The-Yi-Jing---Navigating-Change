<p class="sec">象传（小象）</p>
<p class="text">九五含章，中正也。有陨自天，志不舍命也。</p>
<p class="comment">'The subject of the fifth NINE, (undivided), keeps his brilliant qualities concealed:' - as is indicated by his central and correct position. '(The good issue) descends (as) from Heaven: - 'his aim does not neglect the ordinances (of Heaven).</p>
